  .left { left:-70px; top:120px; transform:rotate(-9deg) scale(.92); }
  .right { right:-70px; top:120px; transform:rotate(9deg) scale(.92); }
  .vign { position:absolute; inset:0; background:radial-gradient(ellipse 52% 80% at 50% 50%, rgba(3,34,26,.0) 40%, rgba(3,34,26,.66) 100%); pointer-events:none; }

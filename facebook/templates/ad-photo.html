<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1080px; height:1350px; }
  body { font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:#03221a; color:#fff; overflow:hidden; position:relative; }
  .photo { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; object-position:50% 22%; }

  .lower { position:absolute; left:60px; right:60px; z-index:4; }
  .title { font-weight:900; letter-spacing:-1.6px; line-height:.98; font-size:70px; }
  .title .ac { color:#34D399; }
  .sub { margin-top:20px; font-size:33px; font-weight:600; line-height:1.22; color:rgba(255,255,255,.94); max-width:21ch; }
  .sub .ac { color:#34D399; font-weight:700; }

  /* Style A: full-bleed photo + bottom scrim */
  body[data-style="a"] .scrim { position:absolute; inset:0; z-index:2;
    background:linear-gradient(to top, rgba(3,30,22,.97) 0%, rgba(3,30,22,.86) 24%, rgba(3,30,22,.28) 48%, rgba(3,30,22,0) 64%); }
  body[data-style="a"] .lower { bottom:80px; }
  body[data-style="a"] .title, body[data-style="a"] .sub { text-shadow:0 2px 24px rgba(0,0,0,.4); }

  /* Style B: photo panel on top + emerald band below */
  body[data-style="b"] .photo { height:760px; }
  body[data-style="b"] .band { position:absolute; left:0; right:0; bottom:0; height:590px; z-index:2;
    background:
      radial-gradient(circle at 86% 12%, rgba(52,211,153,.22), transparent 46%),
      linear-gradient(158deg, #074231 0%, #053527 52%, #03221a 100%); }
  body[data-style="b"] .photo-fade { position:absolute; left:0; right:0; top:628px; height:170px; z-index:2;
    background:linear-gradient(to bottom, rgba(7,66,49,0), #074231); }
  body[data-style="b"] .lower { bottom:84px; }
</style>
</head>
<body>
  <img class="photo" id="photo" alt="">
  <div class="scrim"></div>
  <div class="band"></div>
  <div class="photo-fade"></div>
  <div class="lower">
    <div class="title" id="title">Florida Real Estate<br><span class="ac">License Exam</span></div>
    <div class="sub" id="sub"></div>
  </div>
<script>
  var d = JSON.parse(decodeURIComponent(location.hash.slice(1)));
  document.body.setAttribute('data-style', d.style || 'a');
  var img = document.getElementById('photo');
  img.src = d.photo;
  if (d.pos) img.style.objectPosition = d.pos;
  if (d.title) document.getElementById('title').innerHTML = d.title;
  document.getElementById('sub').innerHTML = d.sub || '';
</script>
</body>
</html>

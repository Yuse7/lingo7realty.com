<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1080px; height:1350px; }
  body {
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:#04261b; color:#fff; overflow:hidden; position:relative;
  }
  .stage {
    position:absolute; inset:0;
    background:
      radial-gradient(circle at 82% 6%, rgba(52,211,153,.28), transparent 42%),
      radial-gradient(circle at 12% 92%, rgba(6,182,140,.22), transparent 46%),
      linear-gradient(158deg, #074231 0%, #053527 45%, #03221a 100%);
    padding:78px 76px 70px;
    display:flex; flex-direction:column;
  }
  /* faint decorative bilingual ghost lines */
  .ghost { position:absolute; right:-40px; top:300px; font-size:240px; font-weight:900;
    color:rgba(255,255,255,.025); letter-spacing:-8px; line-height:.9; pointer-events:none; user-select:none; }
  .brand { display:flex; align-items:center; gap:16px; }
  .brand svg { width:52px; height:52px; display:block; }
  .brand .wm { font-size:30px; font-weight:800; letter-spacing:-.5px; }
  .brand .wm i { font-style:normal; color:#34D399; }
  .eyebrow { margin-top:46px; display:inline-flex; align-items:center; gap:8px; align-self:flex-start;
    background:rgba(52,211,153,.14); color:#6ee7b7; border:1px solid rgba(52,211,153,.25);
    font-size:19px; font-weight:700; padding:11px 20px; border-radius:999px; }
  h1 { margin-top:24px; font-size:58px; line-height:1.05; font-weight:800; letter-spacing:-1.8px; max-width:15ch; }
  h1 .ac { color:#34D399; }
  .sub { margin-top:20px; font-size:24px; line-height:1.45; font-weight:500; color:rgba(255,255,255,.74); max-width:18ch; }
  .phonewrap { flex:1; display:flex; align-items:flex-end; justify-content:center; position:relative; }
  .glow { position:absolute; bottom:90px; left:50%; transform:translateX(-50%); width:600px; height:600px;
    background:radial-gradient(circle, rgba(52,211,153,.42), transparent 62%); filter:blur(20px); }
  .device { position:relative; width:320px; height:600px; transform:scale(1.26); transform-origin:bottom center; margin-bottom:64px; }
  .screen { position:absolute; inset:0; width:320px; height:600px; overflow:hidden;
    border-radius:30px; box-shadow:0 40px 90px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.06);
    background:#f7faf9; }
  .screen iframe { position:absolute; left:-220px; top:0; width:760px; height:700px; border:0; }
  .foot { position:absolute; left:76px; bottom:60px; display:flex; align-items:center; gap:14px;
    font-size:22px; font-weight:700; color:rgba(255,255,255,.9); z-index:5; }
  .foot .dot { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,.35); }
  .foot .langs { color:rgba(255,255,255,.6); font-weight:600; }
</style>
</head>
<body>
  <div class="stage">
    <div class="ghost" id="ghost">Aa</div>
    <div class="brand">
      <svg viewBox="0 0 48 48" fill="none"><path d="M0 24C0 10.7452 10.7452 0 24 0C37.2548 0 48 10.7452 48 24C48 37.2548 37.2548 48 24 48C10.7452 48 0 37.2548 0 24Z" fill="url(#g)"/><path d="M22.6638 17.4485C25.3541 14.4235 27.62 11.2739 29.4615 8L22.345 8C21.159 10.1443 19.808 12.193 18.292 14.1458C16.7518 16.1179 15.0356 18.042 13.1432 19.9183C11.2509 21.7946 9.20315 23.6614 7 25.5185L9.24009 28.8689H22.2695L23.987 26.8699L25.3674 25.2888H14.3841C17.4004 22.8902 20.1603 20.2768 22.6638 17.4485Z" fill="white"/><path d="M25.8524 29.8005C23.1621 32.8256 20.8962 35.975 19.0547 39.249H26.1712C27.3572 37.1046 28.7082 35.056 30.2242 33.1031C31.7644 31.1311 33.4806 29.207 35.3729 27.3307C37.2653 25.4544 39.313 23.5877 41.5162 21.7305L39.2761 18.3801L26.2736 18.6961L23.1488 21.9602L34.1321 21.9602C31.1158 24.3588 28.3559 26.9723 25.8524 29.8005Z" fill="white"/><defs><linearGradient id="g" x1="0" y1="24" x2="48" y2="24" gradientUnits="userSpaceOnUse"><stop stop-color="#07D494"/><stop offset="1" stop-color="#00C2B2"/></linearGradient></defs></svg>
      <span class="wm">Lingo7 <i>Realty</i></span>
    </div>
    <span class="eyebrow" id="eyebrow">📍 Florida Sales Associate</span>
    <h1 id="head"></h1>
    <p class="sub" id="sub"></p>
    <div class="phonewrap">
      <div class="glow"></div>
      <div class="device"><div class="screen"><iframe id="frame" scrolling="no"></iframe></div></div>
    </div>
    <div class="foot"><span>lingo7realty.com</span><span class="dot"></span><span class="langs" id="foot">10 languages</span></div>
  </div>
<script>
  var d = JSON.parse(decodeURIComponent(location.hash.slice(1)));
  document.getElementById('frame').src = d.screen;
  document.getElementById('head').innerHTML = d.head;
  document.getElementById('sub').textContent = d.sub;
  if (d.eyebrow) document.getElementById('eyebrow').innerHTML = d.eyebrow;
  if (d.ghost) document.getElementById('ghost').textContent = d.ghost;
  if (d.foot) document.getElementById('foot').textContent = d.foot;
</script>
</body>
</html>

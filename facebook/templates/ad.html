<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1080px; height:1350px; }
  body { font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:#04261b; color:#fff; overflow:hidden; position:relative; }
  .stage { position:absolute; inset:0;
    background:
      radial-gradient(circle at 82% 4%, rgba(52,211,153,.30), transparent 42%),
      radial-gradient(circle at 10% 96%, rgba(6,182,140,.22), transparent 46%),
      linear-gradient(158deg, #074231 0%, #053527 45%, #03221a 100%);
    padding:74px 72px 64px; display:flex; flex-direction:column; }
  .brand { display:flex; align-items:center; gap:15px; }
  .brand svg { width:50px; height:50px; }
  .brand .wm { font-size:29px; font-weight:800; letter-spacing:-.5px; }
  .brand .wm i { font-style:normal; color:#34D399; }
  .eyebrow { margin-top:34px; align-self:flex-start; display:inline-flex; align-items:center; gap:8px;
    background:rgba(52,211,153,.14); color:#6ee7b7; border:1px solid rgba(52,211,153,.25);
    font-size:18px; font-weight:700; padding:10px 18px; border-radius:999px; }
  h1 { margin-top:20px; font-size:56px; line-height:1.04; font-weight:800; letter-spacing:-1.8px; max-width:17ch; }
  h1 .ac { color:#34D399; }
  .ticks { margin-top:16px; display:flex; flex-wrap:wrap; gap:10px 16px; font-size:20px; font-weight:600; color:rgba(255,255,255,.82); }
  .ticks span { display:inline-flex; align-items:center; gap:8px; }
  .ticks b { color:#34D399; font-weight:800; }
  .phonewrap { flex:1; display:flex; align-items:center; justify-content:center; position:relative; }
  .glow { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:560px; height:560px;
    background:radial-gradient(circle, rgba(52,211,153,.40), transparent 62%); filter:blur(22px); }
  .device { position:relative; width:320px; height:600px; transform:scale(1.04); transform-origin:center; }
  .screen { position:absolute; inset:0; width:320px; height:600px; overflow:hidden;
    border-radius:30px; box-shadow:0 38px 80px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.06); background:#f7faf9; }
  .screen iframe { position:absolute; left:-220px; top:0; width:760px; height:700px; border:0; }
  .cta-block { display:flex; flex-direction:column; align-items:center; gap:16px; }
  .cta { display:inline-flex; align-items:center; gap:12px; background:#34D399; color:#06291d;
    font-size:30px; font-weight:800; letter-spacing:-.3px; padding:20px 44px; border-radius:999px;
    box-shadow:0 14px 34px rgba(52,211,153,.35); }
  .cta svg { width:26px; height:26px; }
  .guarantee { display:flex; align-items:center; gap:10px; font-size:21px; font-weight:600; color:rgba(255,255,255,.8); }
  .guarantee b { color:#fff; font-weight:800; }
</style>
</head>

      <span class="wm">Lingo7 <i>Realty</i></span>

    <span class="eyebrow">📍 Florida Sales Associate exam</span>

</html>
